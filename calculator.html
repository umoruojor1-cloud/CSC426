<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator | CSC426</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .calc-label {
      color: #374151;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .calculator {
      background: #111;
      border-radius: 24px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      border: 1px solid #1e1e1e;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02);
    }

    .display {
      background: #0d0d0d;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      border: 1px solid #1a1a1a;
      overflow: hidden;
    }

    .display-history {
      color: #2d3748;
      font-size: 13px;
      min-height: 20px;
      word-break: break-all;
      text-align: right;
      margin-bottom: 4px;
    }

    .display-current {
      color: #f9fafb;
      font-size: 38px;
      font-weight: 200;
      letter-spacing: -2px;
      word-break: break-all;
      text-align: right;
      line-height: 1;
      transition: color 0.2s;
    }

    .display-current.error { color: #ef4444; font-size: 22px; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      height: 64px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.91); filter: brightness(1.2); }

    .btn-num  { background: #1e1e1e; color: #e5e7eb; }
    .btn-num:hover { background: #252525; }

    .btn-op   { background: #0e1b2e; color: #60a5fa; font-size: 20px; }
    .btn-op:hover { background: #142238; }

    .btn-clear { background: #1f0808; color: #ef4444; font-weight: 700; }
    .btn-clear:hover { background: #2a0a0a; }

    .btn-back { background: #1c1507; color: #f59e0b; font-size: 20px; }
    .btn-back:hover { background: #241c09; }

    .btn-special { background: #0c1a0c; color: #4ade80; font-weight: 600; }
    .btn-special:hover { background: #112211; }

    .btn-eq {
      background: #b91c1c;
      color: white;
      grid-column: span 4;
      height: 52px;
      font-size: 18px;
      letter-spacing: 3px;
      font-weight: 600;
    }
    .btn-eq:hover { background: #dc2626; }
  </style>
</head>
<body>
  <p class="calc-label">CSC426 — Calculator</p>
  <div class="calculator">
    <div class="display">
      <div class="display-history" id="history"></div>
      <div class="display-current" id="display">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-clear"   onclick="clearAll()">C</button>
      <button class="btn btn-back"    onclick="backspace()">⌫</button>
      <button class="btn btn-special" onclick="appendChar('%')">%</button>
      <button class="btn btn-op"      onclick="appendChar('/')">÷</button>

      <button class="btn btn-num"     onclick="appendChar('7')">7</button>
      <button class="btn btn-num"     onclick="appendChar('8')">8</button>
      <button class="btn btn-num"     onclick="appendChar('9')">9</button>
      <button class="btn btn-op"      onclick="appendChar('*')">×</button>

      <button class="btn btn-num"     onclick="appendChar('4')">4</button>
      <button class="btn btn-num"     onclick="appendChar('5')">5</button>
      <button class="btn btn-num"     onclick="appendChar('6')">6</button>
      <button class="btn btn-op"      onclick="appendChar('-')">−</button>

      <button class="btn btn-num"     onclick="appendChar('1')">1</button>
      <button class="btn btn-num"     onclick="appendChar('2')">2</button>
      <button class="btn btn-num"     onclick="appendChar('3')">3</button>
      <button class="btn btn-op"      onclick="appendChar('+')">+</button>

      <button class="btn btn-special" onclick="appendChar('^')">x^y</button>
      <button class="btn btn-num"     onclick="appendChar('0')">0</button>
      <button class="btn btn-num"     onclick="appendChar('.')">.</button>
      <button class="btn btn-special" onclick="appendChar('\\')">int÷</button>

      <button class="btn btn-eq"      onclick="calculate()">= ENTER</button>
    </div>
  </div>

  <script>
    let current = '';
    let historyStr = '';
    let justCalculated = false;

    const displayEl = document.getElementById('display');
    const historyEl = document.getElementById('history');

    function updateDisplay() {
      displayEl.textContent = current || '0';
      displayEl.classList.remove('error');
      historyEl.textContent = historyStr;
    }

    function appendChar(val) {
      const operators = ['+', '-', '*', '/', '^', '%', '\\'];
      const lastChar = current.slice(-1);

      if (justCalculated && !operators.includes(val)) {
        current = '';
        historyStr = '';
      }
      justCalculated = false;

      if (!current && operators.includes(val) && val !== '-') return;
      if (operators.includes(val) && operators.includes(lastChar)) {
        current = current.slice(0, -1);
      }

      if (val === '.') {
        const parts = current.split(/[\+\-\*\/\^\%\\]/);
        if (parts[parts.length - 1].includes('.')) return;
      }

      current += val;
      updateDisplay();
    }

    function clearAll() {
      current = '';
      historyStr = '';
      justCalculated = false;
      updateDisplay();
    }

    function backspace() {
      if (justCalculated) { clearAll(); return; }
      current = current.slice(0, -1);
      updateDisplay();
    }

    function handleIntDiv(expr) {
      while (expr.includes('\\')) {
        expr = expr.replace(/(-?\d+(?:\.\d+)?)\s*\\\s*(\d+(?:\.\d+)?)/, (_, a, b) => {
          return String(Math.floor(parseFloat(a) / parseFloat(b)));
        });
      }
      return expr;
    }

    function calculate() {
      if (!current || current === '-') return;
      try {
        historyStr = current + ' =';
        let expr = current;
        expr = handleIntDiv(expr);
        expr = expr.replace(/\^/g, '**');

        const result = Function('"use strict"; return (' + expr + ')')();
        if (!isFinite(result)) throw new Error('Math error');

        current = String(parseFloat(result.toFixed(10)));
        justCalculated = true;
        updateDisplay();
      } catch (e) {
        historyStr = '';
        displayEl.textContent = 'Error';
        displayEl.classList.add('error');
        current = '';
        justCalculated = false;
        setTimeout(() => { displayEl.textContent = '0'; displayEl.classList.remove('error'); }, 1500);
      }
    }
  </script>
</body>
</html>
